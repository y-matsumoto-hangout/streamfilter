    .sliders {

    .slider-label .value {

    input[type="range"] {

      width: 100%;
      height: 6px;

      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.1s;

    input[type="range"]::-webkit-slider-thumb:hover {

  <script>
    const filters = {
      brightness: document.getElementById('brightness'),
      contrast: document.getElementById('contrast'),
      saturate: document.getElementById('saturate'),
      hueRotate: document.getElementById('hueRotate'),
      sepia: document.getElementById('sepia'),
      blur: document.getElementById('blur'),
    };

    const presets = {
      default:   { brightness: 100, contrast: 100, saturate: 100, hueRotate: 0, sepia: 0, blur: 0 },
      bright:    { brightness: 140, contrast: 110, saturate: 110, hueRotate: 0, sepia: 0, blur: 0 },
      nightmode: { brightness: 70,  contrast: 90,  saturate: 80,  hueRotate: 0, sepia: 10, blur: 0 },
      vivid:     { brightness: 110, contrast: 120, saturate: 180, hueRotate: 0, sepia: 0, blur: 0 },
      warm:      { brightness: 105, contrast: 105, saturate: 110, hueRotate: 15, sepia: 20, blur: 0 },
      cool:      { brightness: 100, contrast: 105, saturate: 90,  hueRotate: 200, sepia: 0, blur: 0 },
      retro:      { brightness: 95,  contrast: 110, saturate: 70,  hueRotate: 10, sepia: 40, blur: 0 },
      nightvision:{ brightness: 80,  contrast: 150, saturate: 120, hueRotate: 120, sepia: 0, blur: 0 },
      infrared:   { brightness: 110, contrast: 140, saturate: 200, hueRotate: 180, sepia: 0, blur: 0 },
    };

    function getEmbedUrl(url) {
      // YouTube
      let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
      if (m) return `https://www.youtube.com/embed/${m[1]}?autoplay=1`;

      m = url.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/);
      if (m) return `https://www.youtube.com/embed/${m[1]}?autoplay=1`;

      m = url.match(/youtube\.com\/live\/([a-zA-Z0-9_-]{11})/);
      if (m) return `https://www.youtube.com/embed/${m[1]}?autoplay=1`;

      // Twitch videos
      m = url.match(/twitch\.tv\/videos\/(\d+)/);
      if (m) return `https://player.twitch.tv/?video=${m[1]}&parent=${location.hostname}&autoplay=true`;

      // Twitch live channels
      m = url.match(/twitch\.tv\/([a-zA-Z0-9_]+)\/?$/);
      if (m && m[1] !== 'videos') return `https://player.twitch.tv/?channel=${m[1]}&parent=${location.hostname}&autoplay=true`;

      // Twitch clips
      m = url.match(/twitch\.tv\/\w+\/clip\/([a-zA-Z0-9_-]+)/);
      if (m) return `https://clips.twitch.tv/embed?clip=${m[1]}&parent=${location.hostname}&autoplay=true`;

      // Vimeo
      m = url.match(/vimeo\.com\/(\d+)/);
      if (m) return `https://player.vimeo.com/video/${m[1]}?autoplay=1`;

      // Dailymotion
      m = url.match(/dailymotion\.com\/video\/([a-zA-Z0-9]+)/);
      if (m) return `https://www.dailymotion.com/embed/video/${m[1]}?autoplay=1`;

      m = url.match(/dai\.ly\/([a-zA-Z0-9]+)/);
      if (m) return `https://www.dailymotion.com/embed/video/${m[1]}?autoplay=1`;

      // Fallback: try any URL directly (works if the site allows iframe embedding)
      if (url.match(/^https?:\/\/.+/)) return url;

      return null;
    }

    function loadVideo() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) return;

      const embedUrl = getEmbedUrl(url);
      if (!embedUrl) {
        alert('Please enter a valid URL');
        return;
      }

      const wrapper = document.getElementById('videoWrapper');
      const placeholder = document.getElementById('placeholder');
      if (placeholder) placeholder.remove();

      let iframe = wrapper.querySelector('iframe');
      if (!iframe) {
        iframe = document.createElement('iframe');
        iframe.id = 'videoFrame';
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        iframe.allowFullscreen = true;
        wrapper.appendChild(iframe);
      }

      iframe.src = embedUrl;
      applyFilters();
    }

    function applyFilters() {
      const b = filters.brightness.value;
      const c = filters.contrast.value;
      const s = filters.saturate.value;
      const h = filters.hueRotate.value;
      const sp = filters.sepia.value;
      const bl = filters.blur.value;

      document.getElementById('brightnessVal').textContent = `${b}%`;
      document.getElementById('contrastVal').textContent = `${c}%`;
      document.getElementById('saturateVal').textContent = `${s}%`;
      document.getElementById('hueRotateVal').textContent = `${h}°`;
      document.getElementById('sepiaVal').textContent = `${sp}%`;
      document.getElementById('blurVal').textContent = `${bl}px`;

      const filterStr = [
        `brightness(${b / 100})`,
        `contrast(${c / 100})`,
        `saturate(${s / 100})`,
        `hue-rotate(${h}deg)`,
        `sepia(${sp / 100})`,
        `blur(${bl}px)`,
      ].join(' ');

      const iframe = document.querySelector('#videoWrapper iframe');
      if (iframe) {
        iframe.style.filter = filterStr;
      }

      document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
    }

    function resetFilters() {
      applyPreset('default');
    }

    function applyPreset(name) {
      const p = presets[name];
      if (!p) return;

      filters.brightness.value = p.brightness;
      filters.contrast.value = p.contrast;
      filters.saturate.value = p.saturate;
      filters.hueRotate.value = p.hueRotate;
      filters.sepia.value = p.sepia;
      filters.blur.value = p.blur;

      applyFilters();

      document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === getPresetLabel(name));
      });
    }

    function getPresetLabel(name) {
      const labels = {
        default: 'Default', bright: 'Bright', nightmode: 'Night Mode',
        vivid: 'Vivid', warm: 'Warm', cool: 'Cool', retro: 'Retro',
        nightvision: 'Night Vision', infrared: 'Infrared'
      };
      return labels[name] || name;
    }

    function resizeVideo() {
      const size = document.getElementById('videoSize').value;
      document.getElementById('videoSizeVal').textContent = `${size}%`;
      document.getElementById('videoWrapper').style.width = `${size}%`;
      document.getElementById('videoWrapper').style.margin = '0 auto';
    }

    // Enter key to load
    document.getElementById('urlInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loadVideo();
    });
  </script>

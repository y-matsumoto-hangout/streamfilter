<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Stream Filter</title>
  <meta name="description" content="The page you are looking for does not exist on Stream Filter.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ff4444'/><polygon points='38,25 38,75 78,50' fill='white'/></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #ccc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }
    .logo { width: 56px; height: 56px; background: #ff4444; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; margin-bottom: 20px; }
    h1 { color: #fff; font-size: 64px; margin-bottom: 8px; font-weight: 700; letter-spacing: -2px; }
    h2 { color: #fff; font-size: 22px; margin-bottom: 16px; font-weight: 600; }
    p { color: #888; max-width: 480px; text-align: center; margin-bottom: 24px; }
    .links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .links a {
      padding: 10px 20px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #ccc;
      text-decoration: none;
      border-radius: 24px;
      font-size: 14px;
      transition: all 0.15s;
    }
    .links a:hover { background: #252525; color: #fff; }
    .links a.primary { background: #ff4444; border-color: #ff4444; color: #fff; }
    .links a.primary:hover { background: #ff5555; }
  </style>
</head>
<body>
  <div class="logo">&#9655;</div>
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>The page you are looking for does not exist or has been moved. Try one of these instead:</p>
  <div class="links">
    <a href="/" class="primary">Stream Filter Home</a>
    <a href="/guide.html">How to Use</a>
    <a href="/ranking">Ranking</a>
    <a href="/ja/">日本語</a>
  </div>
</body>
</html>
